# Full self-hosted stack: PostgreSQL, API, Web, Caddy reverse proxy, scheduled backups.
# Copy .env.example to .env and set secrets before running: docker compose up -d --build

services:
  postgres:
    image: postgres:17
    container_name: ratchet_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ratchet_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - ratchet_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - ratchet

  api:
    build:
      context: .
      dockerfile: WerkonWebServicesRatchet/Dockerfile
    container_name: ratchet_api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      DisableHttpsRedirection: "true"
      ConnectionStrings__DefaultConnection: ${ConnectionStrings__DefaultConnection:?Set ConnectionStrings__DefaultConnection in .env}
      Seed__AdminUserName: ${Seed__AdminUserName:-admin}
      Seed__AdminPassword: ${Seed__AdminPassword:?Set Seed__AdminPassword in .env}
      Seed__AdminDisplayName: ${Seed__AdminDisplayName:-Administrator}
      AppTimeZone: ${AppTimeZone:-Europe/Moscow}
      Backup__StatusFilePath: /backups/status.json
    volumes:
      - ./backups:/backups:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/ready"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - ratchet

  web:
    build:
      context: .
      dockerfile: WerkonWebServicesRatchet.Web/Dockerfile
    container_name: ratchet_web
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      DisableHttpsRedirection: "true"
      RatchetApiBaseUrl: http://api:8080/
      AppTimeZone: ${AppTimeZone:-Europe/Moscow}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - ratchet

  proxy:
    image: caddy:2-alpine
    container_name: ratchet_proxy
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    environment:
      CADDY_ADDRESS: ${CADDY_ADDRESS:-localhost}
      CADDY_GLOBAL_OPTIONS: ${CADDY_GLOBAL_OPTIONS:-auto_https off}
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - ratchet_caddy_data:/data
      - ratchet_caddy_config:/config
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
    networks:
      - ratchet

  backup:
    build:
      context: ./docker/backup
      dockerfile: Dockerfile
    container_name: ratchet_backup
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB:-ratchet_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-86400}
      DAILY_RETENTION_DAYS: ${DAILY_RETENTION_DAYS:-7}
      WEEKLY_RETENTION_WEEKS: ${WEEKLY_RETENTION_WEEKS:-4}
      RESTIC_REPOSITORY: ${RESTIC_REPOSITORY:-}
      RESTIC_PASSWORD: ${RESTIC_PASSWORD:-}
      RESTIC_HOST_TAG: ${RESTIC_HOST_TAG:-ratchet-server}
      RESTIC_KEEP_DAILY: ${RESTIC_KEEP_DAILY:-7}
      RESTIC_KEEP_WEEKLY: ${RESTIC_KEEP_WEEKLY:-4}
    volumes:
      - ./backups:/backups
      - ${RESTIC_HOST_PATH:-./backups/restic-repo}:/restic-repo
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ratchet

volumes:
  ratchet_postgres_data:
  ratchet_caddy_data:
  ratchet_caddy_config:

networks:
  ratchet:
    driver: bridge
